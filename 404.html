<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0b09;--or:#F47B3B;--or2:#e06828;--wh:#f5f2ee;--mu:rgba(245,242,238,0.45);--bd:rgba(244,123,59,0.14);--ss:'Satoshi',sans-serif}
html,body{height:100%}
body{background:var(--bg);color:var(--wh);font-family:var(--ss);overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}

/* Background glow */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%,rgba(244,123,59,0.13) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 100% 60%,rgba(244,123,59,0.06) 0%,transparent 50%),
    radial-gradient(ellipse 50% 40% at 0% 80%,rgba(244,123,59,0.05) 0%,transparent 50%)}

.wrap{position:relative;z-index:1;max-width:560px;width:100%}

/* Logo */
.logo{display:inline-flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:52px}
.logo img{width:34px;height:34px;object-fit:contain}
.logo-t{font-weight:800;font-size:18px;color:var(--wh)}
.logo-t span{color:var(--or)}

/* 404 number */
.num{font-size:clamp(100px,22vw,180px);font-weight:800;line-height:1;letter-spacing:-6px;
  background:linear-gradient(135deg,var(--or) 0%,rgba(244,123,59,0.3) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:8px;user-select:none}

/* Tag */
.tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--or);margin-bottom:20px}

/* Title */
.title{font-size:clamp(22px,4vw,32px);font-weight:800;letter-spacing:-1px;line-height:1.1;margin-bottom:14px}

/* Sub */
.sub{font-size:14.5px;color:var(--mu);line-height:1.7;max-width:380px;margin:0 auto 36px}

/* Button */
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--or);color:#fff;font-family:var(--ss);font-size:14px;font-weight:700;padding:14px 32px;border-radius:100px;text-decoration:none;transition:background .2s,box-shadow .2s,transform .2s}
.btn:hover{background:var(--or2);box-shadow:0 4px 22px rgba(244,123,59,.45);transform:scale(1.03)}
.btn svg{transition:transform .2s}
.btn:hover svg{transform:translateX(3px)}

/* Divider */
.divider{width:1px;height:40px;background:var(--bd);margin:36px auto}

/* Footer link */
.back-link{font-size:13px;color:var(--mu);text-decoration:none;transition:color .2s}
.back-link:hover{color:var(--wh)}
